<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Playground</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1b26;
      --surface: #24283b;
      --border: #414868;
      --text: #c0caf5;
      --text-muted: #565f89;
      --accent: #7aa2f7;
      --accent-hover: #89b4fa;
      --stdout: #9ece6a;
      --stderr: #e0af68;
      --error: #f7768e;
      --editor-bg: #1e2030;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      --font-ui: system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #status {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    #status.ready {
      color: var(--stdout);
    }

    #status.loading {
      color: var(--stderr);
    }

    #run-btn {
      font-family: var(--font-ui);
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.45rem 1.25rem;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #1a1b26;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #run-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    #run-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel + .panel {
      border-left: 1px solid var(--border);
    }

    .panel-header {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #editor {
      flex: 1;
      width: 100%;
      padding: 1rem;
      border: none;
      outline: none;
      resize: none;
      background: var(--editor-bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.6;
      tab-size: 4;
    }

    #console {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background: #0d1117;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #console:empty::before {
      content: "La salida aparecerá aquí…";
      color: var(--text-muted);
      font-style: italic;
    }

    .out-stdout {
      color: var(--stdout);
    }

    .out-stderr {
      color: var(--stderr);
    }

    .out-error {
      color: var(--error);
    }

    .out-error::before {
      content: "✕ ";
      font-weight: bold;
    }

    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .panel + .panel {
        border-left: none;
        border-top: 1px solid var(--border);
      }
    }

    #translations {
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      padding: 0.75rem 1rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #translations.visible {
      display: grid;
      opacity: 1;
      transform: translateY(0);
    }

    .translation-panel {
      display: flex;
      flex-direction: column;
      min-height: 180px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #0d1117;
    }

    .translation-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .copy-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: rgba(122, 162, 247, 0.15);
    }

    .translation-code {
      flex: 1;
      overflow: auto;
      margin: 0;
      padding: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.5;
      white-space: pre;
      color: var(--text);
      background: #0d1117;
    }

    #mode-switch {
      display: flex;
      gap: 8px;
      margin: 8px 8px 0;
    }

    #mode-switch button {
      padding: 4px 16px;
      border-radius: 4px;
      border: 1px solid #555;
      background: transparent;
      color: #ccc;
      cursor: pointer;
    }

    #mode-switch button.active {
      background: #4a9eff;
      color: white;
      border-color: #4a9eff;
    }

    #editor-container {
      flex: 1;
      min-height: 0;
      display: flex;
    }

    #verbose-container {
      display: none;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.5rem 0.75rem 0.75rem;
      background: var(--editor-bg);
    }

    .bloque-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      margin: 4px 0;
      border-radius: 6px;
      border-left: 3px solid #4a9eff;
      background: #1e1e2e;
      font-family: monospace;
    }

    .bloque-texto {
      color: #ccc;
    }

    .placeholder {
      color: #4a9eff;
      font-weight: bold;
      background: #1a2a3a;
      padding: 1px 6px;
      border-radius: 3px;
    }

    .bloque-else-label {
      color: #f0a500;
      border-left-color: #f0a500;
      font-style: italic;
    }

    .bloque-hijos {
      margin-top: 2px;
      margin-bottom: 4px;
      padding-left: 10px;
    }

    #linter-container {
      padding: 6px 12px;
      font-family: monospace;
      font-size: 12px;
      min-height: 24px;
      border-top: 1px solid var(--border);
      background: #171b2a;
    }

    .linter-item {
      display: flex;
      gap: 12px;
      padding: 2px 0;
    }

    .linter-error {
      color: #f87171;
    }

    .linter-warning {
      color: #fbbf24;
    }

    .linter-ok {
      color: #4ade80;
    }

    .linter-linea {
      min-width: 60px;
      color: #666;
    }

    #hilo-panel {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 300px;
      max-height: 48%;
      background: #121622;
    }

    .hilo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      background: var(--surface);
    }

    #hilo-level {
      font-family: var(--font-mono);
      color: var(--accent);
    }

    .hilo-api-row {
      display: flex;
      gap: 0.4rem;
      padding: 0.5rem 0.65rem;
      border-bottom: 1px solid var(--border);
      background: #171b2a;
    }

    #hilo-api-key {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: #0f1320;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.35rem 0.5rem;
    }

    #hilo-save-key {
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      color: var(--text);
      padding: 0.35rem 0.6rem;
      font-size: 0.72rem;
      cursor: pointer;
    }

    #hilo-messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.65rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-family: var(--font-ui);
    }

    .hilo-msg {
      padding: 0.5rem 0.65rem;
      border-radius: 8px;
      max-width: 94%;
      white-space: pre-wrap;
      line-height: 1.4;
      font-size: 0.84rem;
    }

    .hilo-msg.user {
      align-self: flex-end;
      background: rgba(122, 162, 247, 0.2);
      border: 1px solid rgba(122, 162, 247, 0.45);
      color: var(--text);
    }

    .hilo-msg.model {
      align-self: flex-start;
      background: #1c2234;
      border: 1px solid #2b3555;
      color: var(--text);
    }

    #hilo-typing {
      padding: 0 0.7rem 0.45rem;
      font-size: 0.74rem;
      color: var(--text-muted);
      min-height: 1rem;
      font-style: italic;
    }

    .hilo-input-row {
      display: flex;
      gap: 0.4rem;
      padding: 0.55rem 0.65rem 0.65rem;
      border-top: 1px solid var(--border);
      background: #171b2a;
    }

    #hilo-input {
      flex: 1;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: #0f1320;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 0.84rem;
      padding: 0.45rem 0.6rem;
    }

    #hilo-send {
      border: 1px solid var(--accent);
      border-radius: 5px;
      background: rgba(122, 162, 247, 0.12);
      color: var(--text);
      padding: 0.45rem 0.75rem;
      font-size: 0.8rem;
      cursor: pointer;
    }

    #hilo-send:disabled,
    #hilo-save-key:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 980px) {
      #translations {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Python Playground</h1>
    <div class="header-actions">
      <span id="status" class="loading">Iniciando Pyodide...</span>
      <button id="run-btn" disabled>Ejecutar</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">Editor</div>
      <div id="mode-switch">
        <button id="btn-woven" class="active" type="button">Woven</button>
        <button id="btn-verbose" type="button">Verboso</button>
      </div>
      <div id="editor-container">
        <textarea id="editor" spellcheck="false">// Estructura de datos: pila con objetos

class Nodo:
    int valor
    
    init(int valor):
        self.valor = valor
    
    virtual function string describir():
        return "Nodo con valor {self.valor}"


class NodoEspecial extends Nodo:
    string etiqueta
    
    init(int valor, string etiqueta):
        super(valor)
        self.etiqueta = etiqueta
    
    virtual function string describir():
        return "Nodo especial {self.etiqueta}: {self.valor}"


// Construccion de la pila
list<Nodo> pila = []

int i = 0
while i < 3:
    pila.append(new Nodo(i * 10))
    i = i + 1

pila.append(new NodoEspecial(99, "tope"))

// Recorrer e imprimir
int total = 0
for (int j = 0; j < pila.length; j = j + 1):
    print(pila[j].describir())
    total = total + pila[j].valor

print("Total acumulado: {total}")
print("Cantidad de nodos: {pila.length}")</textarea>
      </div>
      <div id="verbose-container" style="display:none"></div>
      <div id="linter-container"></div>
    </section>

    <section class="panel">
      <div class="panel-header">Consola</div>
      <div id="console" role="log" aria-live="polite"></div>
      <section id="hilo-panel" aria-label="Asistente Hilo">
        <div class="hilo-header">
          <span>Hilo</span>
          <span id="hilo-level">Nivel 1</span>
        </div>
        <div class="hilo-api-row">
          <input id="hilo-api-key" type="password" placeholder="Gemini API key">
          <button id="hilo-save-key" type="button">Guardar</button>
        </div>
        <div id="hilo-messages"></div>
        <div id="hilo-typing"></div>
        <div class="hilo-input-row">
          <input id="hilo-input" type="text" placeholder="Pregunta a Hilo...">
          <button id="hilo-send" type="button">Enviar</button>
        </div>
      </section>
    </section>
  </main>

  <section id="translations" aria-label="Traducciones generadas">
    <article class="translation-panel">
      <div class="translation-header">
        <span>Python</span>
        <button class="copy-btn" data-target="python-code" type="button">Copiar</button>
      </div>
      <pre id="python-code" class="translation-code"></pre>
    </article>
    <article class="translation-panel">
      <div class="translation-header">
        <span>Java</span>
        <button class="copy-btn" data-target="java-code" type="button">Copiar</button>
      </div>
      <pre id="java-code" class="translation-code"></pre>
    </article>
    <article class="translation-panel">
      <div class="translation-header">
        <span>C++</span>
        <button class="copy-btn" data-target="cpp-code" type="button">Copiar</button>
      </div>
      <pre id="cpp-code" class="translation-code"></pre>
    </article>
  </section>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    const runBtn = document.getElementById("run-btn");
    const editor = document.getElementById("editor");
    const consoleEl = document.getElementById("console");
    const translationsEl = document.getElementById("translations");
    const pythonCodeEl = document.getElementById("python-code");
    const javaCodeEl = document.getElementById("java-code");
    const cppCodeEl = document.getElementById("cpp-code");
    const editorContainer = document.getElementById("editor-container");
    const verboseContainer = document.getElementById("verbose-container");
    const btnWoven = document.getElementById("btn-woven");
    const btnVerbose = document.getElementById("btn-verbose");
    const hiloLevelEl = document.getElementById("hilo-level");
    const hiloApiKeyEl = document.getElementById("hilo-api-key");
    const hiloSaveKeyBtn = document.getElementById("hilo-save-key");
    const hiloMessagesEl = document.getElementById("hilo-messages");
    const hiloTypingEl = document.getElementById("hilo-typing");
    const hiloInputEl = document.getElementById("hilo-input");
    const hiloSendBtn = document.getElementById("hilo-send");
    const linterContainerEl = document.getElementById("linter-container");

    let pyodide = null;
    let pyodideReady = false;
    let runWovenFn = null;
    let translateWovenFn = null;
    let hiloChatFn = null;
    let lintWovenFn = null;
    let modoVerboso = false;
    let isRunning = false;
    let linterTimeout = null;
    let hiloHistorial = [];
    let nivelAyuda = 1;
    let mensajesEnProblemaActual = 0;
    let contextoEjecucionActual = {
      codigo: "",
      output: [],
      errores: [],
      tieneError: false,
      modo: "woven"
    };

    function setStatus(text, state) {
      statusEl.textContent = text;
      statusEl.className = state;
    }

    function updateRunButton() {
      runBtn.disabled = !pyodide || !runWovenFn || !translateWovenFn || isRunning;
    }

    function clearConsole() {
      consoleEl.innerHTML = "";
    }

    function appendOutput(text, type) {
      const span = document.createElement("span");
      span.className = `out-${type}`;
      span.textContent = text;
      consoleEl.appendChild(span);
    }

    function hideTranslations() {
      translationsEl.classList.remove("visible");
    }

    function showTranslations() {
      translationsEl.classList.add("visible");
    }

    function setTranslations(python, java, cpp) {
      pythonCodeEl.textContent = python;
      javaCodeEl.textContent = java;
      cppCodeEl.textContent = cpp;
    }

    function pyResultToString(pyResult) {
      const value = pyResult.toString();
      if (typeof pyResult.destroy === "function") {
        pyResult.destroy();
      }
      return value;
    }

    function obtenerCodigoEditor() {
      return editor.value;
    }

    function limpiarDiagnosticos() {
      linterContainerEl.innerHTML = "";
    }

    function mostrarDiagnosticos(diagnosticos) {
      linterContainerEl.innerHTML = "";

      if (diagnosticos.length === 0) {
        linterContainerEl.innerHTML = `
            <span class="linter-ok">✓ Sin problemas detectados</span>`;
        return;
      }

      diagnosticos.forEach((d) => {
        const item = document.createElement("div");
        item.className = `linter-item linter-${d.nivel}`;
        item.innerHTML = `
            <span class="linter-linea">Línea ${d.linea}</span>
            <span class="linter-mensaje">${d.mensaje}</span>
        `;
        linterContainerEl.appendChild(item);
      });
    }

    function correrLinter() {
      if (!pyodideReady || !lintWovenFn) return;
      const code = obtenerCodigoEditor();
      if (!code.trim()) {
        limpiarDiagnosticos();
        return;
      }
      try {
        const resultado = JSON.parse(
          pyResultToString(lintWovenFn(code))
        );
        mostrarDiagnosticos(resultado.diagnosticos || []);
      } catch {
        // linter no debe interrumpir al estudiante
      }
    }

    function onCodigoChange() {
      clearTimeout(linterTimeout);
      linterTimeout = setTimeout(() => {
        correrLinter();
      }, 800);
    }

    function mostrarIndicadorNivel(nivel) {
      hiloLevelEl.textContent = `Nivel ${nivel}`;
    }

    function avanzarNivel() {
      if (!contextoEjecucionActual.tieneError) return;
      mensajesEnProblemaActual++;
      if (mensajesEnProblemaActual >= 3 && nivelAyuda < 4) {
        nivelAyuda++;
        mostrarIndicadorNivel(nivelAyuda);
      }
    }

    function reiniciarNivel() {
      nivelAyuda = 1;
      mensajesEnProblemaActual = 0;
      mostrarIndicadorNivel(1);
    }

    function actualizarContextoHilo(codigo, output, errores, tieneError) {
      contextoEjecucionActual = {
        codigo,
        output,
        errores,
        tieneError,
        modo: modoVerboso ? "verboso" : "woven"
      };
      if (!tieneError) reiniciarNivel();
    }

    function appendHiloMessage(role, content) {
      const msg = document.createElement("div");
      msg.className = `hilo-msg ${role === "user" ? "user" : "model"}`;
      msg.textContent = content;
      hiloMessagesEl.appendChild(msg);
      hiloMessagesEl.scrollTop = hiloMessagesEl.scrollHeight;
    }

    function setHiloTyping(isTyping) {
      hiloTypingEl.textContent = isTyping ? "Hilo está escribiendo..." : "";
      hiloSendBtn.disabled = isTyping;
    }

    async function enviarMensajeHilo(mensaje) {
      if (!pyodide || !hiloChatFn) {
        return "Hilo aún no está disponible. Espera a que Pyodide termine de cargar.";
      }

      // Python construye el payload
      const preparacion = JSON.parse(
        pyResultToString(
          hiloChatFn(
            mensaje,
            JSON.stringify(hiloHistorial),
            contextoEjecucionActual.codigo,
            JSON.stringify(contextoEjecucionActual.output),
            JSON.stringify(contextoEjecucionActual.errores),
            contextoEjecucionActual.tieneError,
            contextoEjecucionActual.modo,
            nivelAyuda
          )
        )
      );

      if (!preparacion.ok) {
        return `Error preparando mensaje: ${preparacion.error}`;
      }

      // JS hace la llamada HTTP
      const apiKey = localStorage.getItem("gemini_api_key") ?? "";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${apiKey}`;

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: preparacion.payload
      });

      if (!response.ok) {
        const err = await response.text();
        return `Error de Gemini: ${err}`;
      }

      const responseJson = await response.json();

      // Python parsea la respuesta
      const respuesta = pyResultToString(
        pyodide.globals.get("parsear_respuesta_hilo")(
          JSON.stringify(responseJson)
        )
      );

      hiloHistorial.push({ role: "user", content: mensaje });
      hiloHistorial.push({ role: "model", content: respuesta });
      avanzarNivel();

      return respuesta;
    }

    async function manejarEnvioHilo() {
      const mensaje = hiloInputEl.value.trim();
      if (!mensaje) return;

      appendHiloMessage("user", mensaje);
      hiloInputEl.value = "";
      setHiloTyping(true);
      try {
        const respuesta = await enviarMensajeHilo(mensaje);
        appendHiloMessage("model", respuesta);
      } finally {
        setHiloTyping(false);
      }
    }

    async function loadWovenModules() {
      const wovenFiles = [
        "WovenLexer.py",
        "WovenParser.py",
        "WovenVisitor.py",
        "interpreter_visitor.py",
        "translator_visitor.py",
      ];

      for (const fileName of wovenFiles) {
        const response = await fetch(`woven/${fileName}`);
        if (!response.ok) {
          throw new Error(`No se pudo cargar ${fileName}`);
        }
        const content = await response.text();
        pyodide.FS.writeFile(fileName, content);
      }

      const tracingCode = await fetch("woven/tracing_visitor.py").then((r) => r.text());
      pyodide.FS.writeFile("/home/pyodide/tracing_visitor.py", tracingCode);
      const verboseCode = await fetch("woven/verbose_visitor.py").then((r) => r.text());
      pyodide.FS.writeFile("/home/pyodide/verbose_visitor.py", verboseCode);
      const hiloCode = await fetch("woven/gemini_agent.py").then((r) => r.text());
      pyodide.FS.writeFile("/home/pyodide/gemini_agent.py", hiloCode);
      const linterCode = await fetch("woven/linter_visitor.py").then((r) => r.text());
      pyodide.FS.writeFile("/home/pyodide/linter_visitor.py", linterCode);
    }

    async function initPyodide() {
      try {
        setStatus("Iniciando Pyodide...", "loading");
        pyodide = await loadPyodide();

        pyodide.setStdout({ batched: (msg) => appendOutput(msg, "stdout") });
        pyodide.setStderr({ batched: (msg) => appendOutput(msg, "stderr") });

        setStatus("Instalando runtime de ANTLR...", "loading");
        await pyodide.loadPackage("micropip");
        await pyodide.runPythonAsync(`
import micropip
await micropip.install("antlr4-python3-runtime==4.13.2")
`);

        setStatus("Cargando Woven...", "loading");
        await loadWovenModules();
        await pyodide.runPythonAsync(`
import sys
if "." not in sys.path:
    sys.path.append(".")

def run_woven(source: str) -> list:
    from antlr4 import CommonTokenStream, InputStream
    from WovenLexer import WovenLexer
    from WovenParser import WovenParser
    from interpreter_visitor import InterpreterVisitor

    lexer = WovenLexer(InputStream(source))
    stream = CommonTokenStream(lexer)
    parser = WovenParser(stream)
    tree = parser.program()
    visitor = InterpreterVisitor()
    return visitor.visit(tree)

from translator_visitor import translate_woven
from tracing_visitor import trace_woven
from verbose_visitor import verbose_woven
from gemini_agent import hilo_chat, parsear_respuesta_hilo
from linter_visitor import lint_woven
`);
        runWovenFn = pyodide.globals.get("run_woven");
        translateWovenFn = pyodide.globals.get("translate_woven");
        hiloChatFn = pyodide.globals.get("hilo_chat");
        lintWovenFn = pyodide.globals.get("lint_woven");
        pyodideReady = true;
        correrLinter();

        setStatus("Listo", "ready");
      } catch (err) {
        runWovenFn = null;
        translateWovenFn = null;
        hiloChatFn = null;
        lintWovenFn = null;
        pyodideReady = false;
        pyodide = null;
        setStatus("Error al cargar Python", "loading");
        appendOutput(String(err), "error");
      } finally {
        updateRunButton();
      }
    }

    function mostrarModoWoven() {
      editorContainer.style.display = "flex";
      verboseContainer.style.display = "none";
      contextoEjecucionActual.modo = "woven";
    }

    function colorPorTipo(tipo) {
      const colores = {
        class_decl: "#a855f7",
        function_decl: "#f59e0b",
        method_decl: "#f59e0b",
        constructor_decl: "#f59e0b",
        if_stmt: "#10b981",
        while_stmt: "#10b981",
        for_stmt: "#10b981",
        var_decl: "#4a9eff",
        field_decl: "#4a9eff",
        list_decl: "#4a9eff",
        assignment: "#64748b",
        print_stmt: "#06b6d4",
        return_stmt: "#f43f5e",
        method_call: "#64748b",
      };
      return colores[tipo] ?? "#555";
    }

    function renderizarBloques(bloques, container, nivel = 0) {
      if (!container) {
        container = verboseContainer;
        container.innerHTML = "";
      }

      bloques.forEach((bloque) => {
        const card = document.createElement("div");
        card.className = `bloque-card nivel-${nivel}`;
        card.style.marginLeft = `${nivel * 28}px`;
        card.style.borderLeftColor = colorPorTipo(bloque.tipo);

        const texto = bloque.texto.replace(
          /\{(\w+)\}/g,
          (_, key) => `<span class="placeholder">${bloque.placeholders[key] ?? key}</span>`
        );

        card.innerHTML = `<span class="bloque-texto">${texto}</span>`;
        container.appendChild(card);

        if (bloque.hijos?.length > 0) {
          const wrapper = document.createElement("div");
          wrapper.className = "bloque-hijos";
          wrapper.style.borderLeft = `2px solid ${colorPorTipo(bloque.tipo)}33`;
          wrapper.style.marginLeft = `${nivel * 28 + 14}px`;
          container.appendChild(wrapper);
          renderizarBloques(bloque.hijos, wrapper, 0);
        }

        if (bloque.hijos_else?.length > 0) {
          const elseCard = document.createElement("div");
          elseCard.className = "bloque-card bloque-else";
          elseCard.style.marginLeft = `${nivel * 28}px`;
          elseCard.innerHTML = `<span class="bloque-texto">sino</span>`;
          container.appendChild(elseCard);

          const wrapperElse = document.createElement("div");
          wrapperElse.className = "bloque-hijos";
          wrapperElse.style.borderLeft = "2px solid #f0a50033";
          wrapperElse.style.marginLeft = `${nivel * 28 + 14}px`;
          container.appendChild(wrapperElse);
          renderizarBloques(bloque.hijos_else, wrapperElse, 0);
        }
      });
    }

    function mostrarModoVerboso() {
      if (!pyodide) return;
      const code = editor.value;
      const resultado = JSON.parse(
        pyodide.globals.get("verbose_woven")(code)
      );
      renderizarBloques(resultado.bloques);
      editorContainer.style.display = "none";
      verboseContainer.style.display = "block";
      contextoEjecucionActual.modo = "verboso";
    }

    async function runCode() {
      if (!pyodide || isRunning) return;

      isRunning = true;
      updateRunButton();
      clearConsole();
      hideTranslations();
      appendOutput("Ejecutando...\n", "stdout");

      const code = editor.value;

      try {
        const outputProxy = runWovenFn(code);
        const output = outputProxy.toJs().map((line) => String(line));
        outputProxy.destroy();

        const traza = pyodide.globals.get("trace_woven")(code);
        const trazaObj = JSON.parse(traza);
        console.log("=== TRAZA WOVEN ===");
        console.log("Total pasos:", trazaObj.total_pasos);
        console.log("Éxito:", trazaObj.exito);
        console.log("Eventos:", trazaObj.eventos);
        console.table(
          trazaObj.eventos.map((e) => ({
            paso: e.paso,
            tipo: e.tipo,
            linea: e.linea ?? "-",
            detalle: e.nombre ?? e.mensaje ?? "-",
            call_stack: (e.call_stack ?? []).join(" → ") || "-",
          }))
        );

        if (!output || output.length === 0) {
          appendOutput("Ejecución completada sin salida.\n", "stdout");
        } else {
          for (const line of output) {
            appendOutput(`${line}\n`, "stdout");
          }
        }

        const errores = output.filter((line) => line.startsWith("Error"));
        const tieneError = errores.length > 0;
        actualizarContextoHilo(code, output, errores, tieneError);

        const pyTrans = pyResultToString(translateWovenFn(code, "python"));
        const javaTrans = pyResultToString(translateWovenFn(code, "java"));
        const cppTrans = pyResultToString(translateWovenFn(code, "cpp"));
        setTranslations(pyTrans, javaTrans, cppTrans);
        showTranslations();
      } catch (err) {
        hideTranslations();
        const mensaje = err.message || String(err);
        appendOutput(mensaje, "error");
        actualizarContextoHilo(code, [], [mensaje], true);
      } finally {
        isRunning = false;
        updateRunButton();
      }
    }

    runBtn.addEventListener("click", runCode);

    btnWoven.addEventListener("click", () => {
      modoVerboso = false;
      btnWoven.classList.add("active");
      btnVerbose.classList.remove("active");
      mostrarModoWoven();
    });

    btnVerbose.addEventListener("click", () => {
      modoVerboso = true;
      btnVerbose.classList.add("active");
      btnWoven.classList.remove("active");
      mostrarModoVerboso();
    });

    editor.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        if (!runBtn.disabled) runCode();
      }
    });

    editor.addEventListener("input", () => {
      contextoEjecucionActual.codigo = editor.value;
      reiniciarNivel();
      onCodigoChange();
    });

    hiloSaveKeyBtn.addEventListener("click", () => {
      localStorage.setItem("gemini_api_key", hiloApiKeyEl.value.trim());
      appendHiloMessage("model", "Clave de Gemini guardada en este navegador.");
    });

    hiloSendBtn.addEventListener("click", manejarEnvioHilo);
    hiloInputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!hiloSendBtn.disabled) manejarEnvioHilo();
      }
    });

    document.querySelectorAll(".copy-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const targetId = btn.getAttribute("data-target");
        const text = document.getElementById(targetId).textContent;
        try {
          await navigator.clipboard.writeText(text);
          const original = btn.textContent;
          btn.textContent = "Copiado";
          setTimeout(() => {
            btn.textContent = original;
          }, 900);
        } catch {
          appendOutput("No se pudo copiar al portapapeles.\n", "stderr");
        }
      });
    });

    hideTranslations();
    mostrarModoWoven();
    mostrarIndicadorNivel(1);
    hiloApiKeyEl.value = localStorage.getItem("gemini_api_key") ?? "";
    actualizarContextoHilo(editor.value, [], [], false);
    appendHiloMessage("model", "Hola, soy Hilo. Cuéntame qué te está costando del programa actual.");

    initPyodide();
  </script>
</body>
</html>
