<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Playground</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1a1b26;
      --surface: #24283b;
      --border: #414868;
      --text: #c0caf5;
      --text-muted: #565f89;
      --accent: #7aa2f7;
      --accent-hover: #89b4fa;
      --stdout: #9ece6a;
      --stderr: #e0af68;
      --error: #f7768e;
      --editor-bg: #1e2030;
      --font-mono: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      --font-ui: system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #status {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    #status.ready {
      color: var(--stdout);
    }

    #status.loading {
      color: var(--stderr);
    }

    #run-btn {
      font-family: var(--font-ui);
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.45rem 1.25rem;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #1a1b26;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #run-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    #run-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel + .panel {
      border-left: 1px solid var(--border);
    }

    .panel-header {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #editor {
      flex: 1;
      width: 100%;
      padding: 1rem;
      border: none;
      outline: none;
      resize: none;
      background: var(--editor-bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.6;
      tab-size: 4;
    }

    #console {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background: #0d1117;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #console:empty::before {
      content: "La salida aparecerá aquí…";
      color: var(--text-muted);
      font-style: italic;
    }

    .out-stdout {
      color: var(--stdout);
    }

    .out-stderr {
      color: var(--stderr);
    }

    .out-error {
      color: var(--error);
    }

    .out-error::before {
      content: "✕ ";
      font-weight: bold;
    }

    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .panel + .panel {
        border-left: none;
        border-top: 1px solid var(--border);
      }
    }

    #translations {
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      padding: 0.75rem 1rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #translations.visible {
      display: grid;
      opacity: 1;
      transform: translateY(0);
    }

    .translation-panel {
      display: flex;
      flex-direction: column;
      min-height: 180px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #0d1117;
    }

    .translation-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .copy-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: rgba(122, 162, 247, 0.15);
    }

    .translation-code {
      flex: 1;
      overflow: auto;
      margin: 0;
      padding: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.5;
      white-space: pre;
      color: var(--text);
      background: #0d1117;
    }

    @media (max-width: 980px) {
      #translations {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Python Playground</h1>
    <div class="header-actions">
      <span id="status" class="loading">Iniciando Pyodide...</span>
      <button id="run-btn" disabled>Ejecutar</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">Editor</div>
      <textarea id="editor" spellcheck="false">// Calcula el factorial de un número
function int factorial(int n):
    if n <= 1:
        return 1
    else:
        return n * factorial(n - 1)

// Suma acumulada con ciclo
int total = 0
for (int i = 1; i < 6; i = i + 1):
    total = total + i

bool esPositivo = total > 0
int resultado = factorial(5)

print("Suma del 1 al 5: {total}")
print("Factorial de 5: {resultado}")
print("Es positivo: {esPositivo}")</textarea>
    </section>

    <section class="panel">
      <div class="panel-header">Consola</div>
      <div id="console" role="log" aria-live="polite"></div>
    </section>
  </main>

  <section id="translations" aria-label="Traducciones generadas">
    <article class="translation-panel">
      <div class="translation-header">
        <span>Python</span>
        <button class="copy-btn" data-target="python-code" type="button">Copiar</button>
      </div>
      <pre id="python-code" class="translation-code"></pre>
    </article>
    <article class="translation-panel">
      <div class="translation-header">
        <span>Java</span>
        <button class="copy-btn" data-target="java-code" type="button">Copiar</button>
      </div>
      <pre id="java-code" class="translation-code"></pre>
    </article>
    <article class="translation-panel">
      <div class="translation-header">
        <span>C++</span>
        <button class="copy-btn" data-target="cpp-code" type="button">Copiar</button>
      </div>
      <pre id="cpp-code" class="translation-code"></pre>
    </article>
  </section>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    const runBtn = document.getElementById("run-btn");
    const editor = document.getElementById("editor");
    const consoleEl = document.getElementById("console");
    const translationsEl = document.getElementById("translations");
    const pythonCodeEl = document.getElementById("python-code");
    const javaCodeEl = document.getElementById("java-code");
    const cppCodeEl = document.getElementById("cpp-code");

    let pyodide = null;
    let runWovenFn = null;
    let translateWovenFn = null;
    let isRunning = false;

    function setStatus(text, state) {
      statusEl.textContent = text;
      statusEl.className = state;
    }

    function updateRunButton() {
      runBtn.disabled = !pyodide || !runWovenFn || !translateWovenFn || isRunning;
    }

    function clearConsole() {
      consoleEl.innerHTML = "";
    }

    function appendOutput(text, type) {
      const span = document.createElement("span");
      span.className = `out-${type}`;
      span.textContent = text;
      consoleEl.appendChild(span);
    }

    function hideTranslations() {
      translationsEl.classList.remove("visible");
    }

    function showTranslations() {
      translationsEl.classList.add("visible");
    }

    function setTranslations(python, java, cpp) {
      pythonCodeEl.textContent = python;
      javaCodeEl.textContent = java;
      cppCodeEl.textContent = cpp;
    }

    function pyResultToString(pyResult) {
      const value = pyResult.toString();
      if (typeof pyResult.destroy === "function") {
        pyResult.destroy();
      }
      return value;
    }

    async function loadWovenModules() {
      const wovenFiles = [
        "WovenLexer.py",
        "WovenParser.py",
        "WovenVisitor.py",
        "interpreter_visitor.py",
        "translator_visitor.py",
      ];

      for (const fileName of wovenFiles) {
        const response = await fetch(`woven/${fileName}`);
        if (!response.ok) {
          throw new Error(`No se pudo cargar ${fileName}`);
        }
        const content = await response.text();
        pyodide.FS.writeFile(fileName, content);
      }
    }

    async function initPyodide() {
      try {
        setStatus("Iniciando Pyodide...", "loading");
        pyodide = await loadPyodide();

        pyodide.setStdout({ batched: (msg) => appendOutput(msg, "stdout") });
        pyodide.setStderr({ batched: (msg) => appendOutput(msg, "stderr") });

        setStatus("Instalando runtime de ANTLR...", "loading");
        await pyodide.loadPackage("micropip");
        await pyodide.runPythonAsync(`
import micropip
await micropip.install("antlr4-python3-runtime==4.13.2")
`);

        setStatus("Cargando Woven...", "loading");
        await loadWovenModules();
        await pyodide.runPythonAsync(`
import sys
if "." not in sys.path:
    sys.path.append(".")

def run_woven(source: str) -> list:
    from antlr4 import CommonTokenStream, InputStream
    from WovenLexer import WovenLexer
    from WovenParser import WovenParser
    from interpreter_visitor import InterpreterVisitor

    lexer = WovenLexer(InputStream(source))
    stream = CommonTokenStream(lexer)
    parser = WovenParser(stream)
    tree = parser.program()
    visitor = InterpreterVisitor()
    return visitor.visit(tree)

from translator_visitor import translate_woven
`);
        runWovenFn = pyodide.globals.get("run_woven");
        translateWovenFn = pyodide.globals.get("translate_woven");

        setStatus("Listo", "ready");
      } catch (err) {
        runWovenFn = null;
        translateWovenFn = null;
        pyodide = null;
        setStatus("Error al cargar Python", "loading");
        appendOutput(String(err), "error");
      } finally {
        updateRunButton();
      }
    }

    async function runCode() {
      if (!pyodide || isRunning) return;

      isRunning = true;
      updateRunButton();
      clearConsole();
      hideTranslations();
      appendOutput("Ejecutando...\n", "stdout");

      const code = editor.value;

      try {
        const outputProxy = runWovenFn(code);
        const output = outputProxy.toJs();
        outputProxy.destroy();

        if (!output || output.length === 0) {
          appendOutput("Ejecución completada sin salida.\n", "stdout");
        } else {
          for (const line of output) {
            appendOutput(`${line}\n`, "stdout");
          }
        }

        const pyTrans = pyResultToString(translateWovenFn(code, "python"));
        const javaTrans = pyResultToString(translateWovenFn(code, "java"));
        const cppTrans = pyResultToString(translateWovenFn(code, "cpp"));
        setTranslations(pyTrans, javaTrans, cppTrans);
        showTranslations();
      } catch (err) {
        hideTranslations();
        appendOutput(err.message || String(err), "error");
      } finally {
        isRunning = false;
        updateRunButton();
      }
    }

    runBtn.addEventListener("click", runCode);

    editor.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        e.preventDefault();
        if (!runBtn.disabled) runCode();
      }
    });

    document.querySelectorAll(".copy-btn").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const targetId = btn.getAttribute("data-target");
        const text = document.getElementById(targetId).textContent;
        try {
          await navigator.clipboard.writeText(text);
          const original = btn.textContent;
          btn.textContent = "Copiado";
          setTimeout(() => {
            btn.textContent = original;
          }, 900);
        } catch {
          appendOutput("No se pudo copiar al portapapeles.\n", "stderr");
        }
      });
    });

    hideTranslations();

    initPyodide();
  </script>
</body>
</html>
